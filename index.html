<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinkCalc 🎀</title>

<style>
:root {
    --pink-main: #ff8fab;
    --pink-soft: #ffe4ec;
    --pink-bg: #fff5f8;
    --text: #c9184a;
}

/* Reset */
* {
    box-sizing: border-box;
    margin: 0;
}

/* Better mobile height fix */
body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #ffd6e0, #ffc0cb, #ffe4ec);
}

/* Calculator */
.calculator {
    width: min(100%, 360px);
    padding: 18px;
    border-radius: 20px;

    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(10px);

    box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
}

/* Display */
.display {
    width: 100%;
    height: 65px;
    border: none;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;

    font-size: 1.6rem;
    text-align: right;

    background: var(--pink-bg);
    color: var(--text);
}

/* Buttons */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 14px;
    font-size: 1.1rem;
    border: none;
    border-radius: 10px;

    background: var(--pink-soft);
    color: var(--text);

    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
}

button:hover {
    background: #ffd1dc;
}

button:active {
    transform: scale(0.95);
}

.equal {
    background: var(--pink-main);
    color: white;
}

.wide {
    grid-column: span 4;
}

/* Info panel (replaces modal) */
.info {
    margin-top: 12px;
    padding: 10px;
    border-radius: 12px;

    background: #fff0f5;
    color: var(--text);
    font-size: 0.85rem;

    display: none;
}

.info.active {
    display: block;
}

/* Footer */
.footer {
    margin-top: 8px;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text);
}
</style>

</head>

<body>

<div class="calculator">
    <input type="text" class="display" id="display" readonly>

```
<div class="buttons">
    <button data-val="7">7</button>
    <button data-val="8">8</button>
    <button data-val="9">9</button>
    <button data-val="+">+</button>

    <button data-val="4">4</button>
    <button data-val="5">5</button>
    <button data-val="6">6</button>
    <button data-val="-">-</button>

    <button data-val="1">1</button>
    <button data-val="2">2</button>
    <button data-val="3">3</button>
    <button data-val="*">×</button>

    <button onclick="showInfo('dev')">A</button>
    <button onclick="showInfo('app')">B</button>
    <button data-val="/">÷</button>
    <button class="equal" onclick="calculate()">=</button>

    <button class="wide" onclick="clearDisplay()">Clear</button>
</div>

<div class="info" id="infoBox"></div>

<div class="footer">PinkCalc 🎀</div>
```

</div>

<script>
const display = document.getElementById("display");

/* Input handling */
document.querySelectorAll("[data-val]").forEach(btn => {
    btn.addEventListener("click", () => {
        display.value += btn.dataset.val;
    });
});

/* Keyboard support */
document.addEventListener("keydown", (e) => {
    if ("0123456789+-*/.".includes(e.key)) {
        display.value += e.key;
    } else if (e.key === "Enter") {
        calculate();
    } else if (e.key === "Backspace") {
        display.value = display.value.slice(0, -1);
    }
});

/* Clear */
function clearDisplay() {
    display.value = "";
}

/* Safe calculation */
function calculate() {
    try {
        display.value = Function("return " + display.value)();
    } catch {
        display.value = "Error";
    }
}

/* Info panel instead of modal */
function showInfo(type) {
    const box = document.getElementById("infoBox");

    if (type === "dev") {
        box.innerHTML = `
        🎀 Developer<br>
        <b>Chrisjane Tatchado</b><br>
        username: chriscamanchotatchado-maker<br>
        Student at MSU Buug
        `;
    } else {
        box.innerHTML = `
        💖 About App<br>
        Simple pink calculator 🎀<br>
        Clean & responsive UI ✨
        `;
    }

    box.classList.toggle("active");
}
</script>

</body>
</html>
