<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinkCalc 🎀</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #ffd6e0, #ffc0cb, #ffe4ec);
}

/* Calculator container */
.calculator {
    width: 100%;
    max-width: 320px;
    padding: 20px;
    border-radius: 25px;

    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(15px);

    box-shadow: 0 0 20px rgba(255,182,193,0.6);
}

/* Display */
.display {
    width: 100%;
    height: 60px;
    border: none;
    border-radius: 15px;
    margin-bottom: 15px;
    padding: 10px;
    font-size: 1.5em;
    text-align: right;

    background: #fff5f8;
    color: #c9184a;

    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}

/* Grid buttons */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* Buttons */
button {
    padding: 15px;
    font-size: 1.1em;
    border: none;
    border-radius: 12px;
    cursor: pointer;

    background: #ffe4ec;
    color: #c9184a;

    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transition: 0.2s;
}

button:active {
    transform: scale(0.95);
}

/* Equal */
.equal {
    background: #ff8fab;
    color: white;
}

/* Clear button */
.wide {
    grid-column: span 4;
}

/* Footer */
.footer {
    margin-top: 10px;
    text-align: center;
    font-size: 0.8em;
    color: #c9184a;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #fff0f5;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    width: 90%;
    max-width: 280px;
    color: #c9184a;
}

.close {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    background: #ff8fab;
    color: white;
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" class="display" id="display" disabled>

    <div class="buttons">
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">-</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('*')">×</button>

        <button onclick="showDeveloper()">A</button>
        <button onclick="showApp()">B</button>
        <button onclick="append('/')">÷</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="wide" onclick="clearDisplay()">Clear (｡•ᴗ•｡)♡</button>
    </div>

    <div class="footer">PinkCalc 🎀</div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content" id="modal-content"></div>
</div>

<script>
function append(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {
    try {
        document.getElementById("display").value =
            eval(document.getElementById("display").value);
    } catch {
        document.getElementById("display").value = "Error";
    }
}

function showDeveloper() {
    showModal(`
        🎀 Developer 🎀<br><br>
        <b>Chrisjane Tatchado</b><br>
        username: chriscamanchotatchado-maker<br>
        Student at MSU Buug
    `);
}

function showApp() {
    showModal(`
        💖 About App 💖<br><br>
        Simple pink calculator 🎀<br>
        With A & B info buttons ✨
    `);
}

function showModal(text) {
    document.getElementById("modal-content").innerHTML =
        text + "<br><button class='close' onclick='closeModal()'>Close</button>";
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
