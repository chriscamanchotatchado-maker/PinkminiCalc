<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinkCalc 🎀</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #ffc0cb, #ffe4ec);
}

/* Floating glass card */
.calculator {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(18px);
    padding: 25px;
    border-radius: 30px;
    box-shadow: 0 20px 40px rgba(255, 182, 193, 0.4);
    width: 270px;
    text-align: center;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

.display {
    width: 100%;
    height: 55px;
    border: none;
    border-radius: 20px;
    margin-bottom: 15px;
    text-align: right;
    padding: 10px;
    font-size: 1.6em;
    background: #fff5f8;
    color: #c9184a;
    outline: none;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    border: none;
    border-radius: 50%;
    font-size: 1.1em;
    cursor: pointer;
    background: linear-gradient(145deg, #ffe4ec, #ffd6e0);
    color: #c9184a;
    box-shadow: 4px 4px 10px rgba(0,0,0,0.1),
                -4px -4px 10px rgba(255,255,255,0.7);
    transition: all 0.2s ease;
}

button:hover {
    transform: scale(1.08);
    background: #ffc2d1;
}

.equal {
    background: linear-gradient(145deg, #ff8fab, #ff5d8f);
    color: white;
}

.equal:hover {
    background: #ff477e;
}

.wide {
    grid-column: span 4;
    border-radius: 15px;
}

.footer {
    margin-top: 12px;
    font-size: 0.8em;
    color: #c9184a;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #fff0f5;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    color: #c9184a;
    width: 260px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.close {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    background: #ff8fab;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" class="display" id="display" disabled>

    <div class="buttons">
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">-</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('*')">×</button>

        <button onclick="showDeveloper()">A</button>
        <button onclick="showApp()">B</button>
        <button onclick="append('/')">÷</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="wide" onclick="clearDisplay()">Clear (｡•ᴗ•｡)♡</button>
    </div>

    <div class="footer">PinkCalc 🎀 (˶ᵔ ᵕ ᵔ˶)</div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content" id="modal-content"></div>
</div>

<script>
function append(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {
    try {
        let result = eval(document.getElementById("display").value);
        document.getElementById("display").value = result;
    } catch {
        document.getElementById("display").value = "Error (╥﹏╥)";
    }
}

function showDeveloper() {
    showModal(`
        🎀 Developer 🎀<br><br>
        <b>Chrisjane Tatchado</b><br>
        ✧ username: chriscamanchotatchado-maker<br>
        ✧ Student at MSU Buug<br><br>
        (｡•̀ᴗ-)✧ cute coder ♡
    `);
}

function showApp() {
    showModal(`
        💖 About This App 💖<br><br>
        A coquette-style calculator 🎀<br>
        Soft pink aesthetic + cute vibes ✨<br>
        Includes special buttons A & B!<br><br>
        (≧◡≦) ♡
    `);
}

function showModal(text) {
    document.getElementById("modal-content").innerHTML =
        text + "<br><button class='close' onclick='closeModal()'>Close ♡</button>";
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
